<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Bykdg</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root {
      --purple: #7C4DFF;
      --purple-dark: #5E35B1;
      --purple-light: #B39DDB;
      --bg: #0F0B1F;
      --text: #F5F3FF;
      --text-dim: #A8A1C2;
      --accent: #FF6EC7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-size: clamp(120px, 20vw, 200px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--purple-light) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    p {
      color: var(--text-dim);
      font-size: 17px;
      margin-bottom: 32px;
      max-width: 500px;
    }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
      color: white;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: all .2s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(124, 77, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back to familiar ground.</p>
  <a href="/">← Back to home</a>
</body>
</html>
